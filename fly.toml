# fly.toml app configuration file generated for arguss on 2026-05-13T13:03:08-05:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'arguss'
primary_region = 'dfw'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024

[[mounts]]
  source = "arguss_data"
  destination = "/data"

[env]
  ANTHROPIC_MODEL = "claude-sonnet-4-5"
  OSV_API_BASE = "https://api.osv.dev"
  NPM_REGISTRY_BASE = "https://registry.npmjs.org"
  DEPSDEV_API_BASE = "https://api.deps.dev/v3"
  GITHUB_API_BASE = "https://api.github.com"
  ARGUSS_DB_PATH = "/data/arguss.db"
  CACHE_TTL_HOURS = "24"
  AI_EXPLANATION_TTL_DAYS = "7"
  LOG_LEVEL = "INFO"
  ARGUSS_DEMO_USERNAME = "demo"
