<section class="exec-summary" aria-label="Executive summary">
  <div class="exec-summary-header">
    <span class="exec-summary-label">Executive summary</span>
    {% if executive_summary %}
      <span class="exec-summary-chip">✨ Generated by Claude</span>
    {% endif %}
  </div>
  <div class="exec-summary-body">
    {% if executive_summary %}
      <p>{{ executive_summary }}</p>
    {% else %}
      <p class="exec-summary-unavailable">Executive summary unavailable for this scan.</p>
    {% endif %}
  </div>
</section>
