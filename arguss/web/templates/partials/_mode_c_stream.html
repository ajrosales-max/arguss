{# partials/_mode_c_stream.html — shared Mode C SSE progress UI #}
<script>
  (function() {
    const formId = {{ (mode_c_form_id or '') | tojson }};
    const startUrl = {{ (mode_c_start_url or '') | tojson }};
    const streamPrefix = {{ (mode_c_stream_prefix or '/dashboard/scan-with-action/stream/') | tojson }};
    const autoScanId = {{ (mode_c_auto_scan_id or '') | tojson }};
    const planUrl = {{ (mode_c_plan_url or '') | tojson }};
    const redirectOnComplete = {{ mode_c_redirect_on_complete | default(true) | tojson }};
    const enrichedRows = {{ mode_c_enriched_rows | default(false) | tojson }};

    const form = formId ? document.getElementById(formId) : null;
    const urlInput = document.getElementById('action-url');
    const patInput = document.getElementById('action-pat');
    const submitBtn = form ? (document.getElementById('action-submit') || form.querySelector('[type=submit]')) : null;
    const previewEl = document.getElementById('pat-preview');
    const spinner = document.getElementById('spinner');
    const progress = document.getElementById('mode-c-progress');
    const phaseEl = document.getElementById('mode-c-phase');
    const listEl = document.getElementById('mode-c-action-list');
    const completeEl = document.getElementById('stream-complete');
    const completeHeading = document.getElementById('stream-complete-heading');
    const completeFailed = document.getElementById('stream-complete-failed');
    const rows = new Map();
    let plannedCount = 0;

    function updateGuard() {
      if (!submitBtn || !urlInput || !patInput) return;
      submitBtn.disabled = !(urlInput.value.trim() && patInput.value.trim());
    }
    function updatePreview() {
      if (!previewEl || !patInput) return;
      const v = patInput.value.trim();
      if (v.length < 8) { previewEl.hidden = true; previewEl.textContent = ''; return; }
      previewEl.hidden = false;
      previewEl.textContent = v.slice(0, 14) + '••••••••' + v.slice(-4);
    }
    function setPhase(text) { if (phaseEl) phaseEl.textContent = text; }
    function ensureRow(id, pkg, fromV, toV, status) {
      let row = rows.get(id);
      if (!row && listEl) {
        row = document.createElement('li');
        row.className = 'mode-c-action-row';
        row.dataset.candidateId = id;
        row.innerHTML = '<span class="mode-c-action-icon"></span><span class="mode-c-action-label"></span><span class="mode-c-action-meta"></span>';
        listEl.appendChild(row);
        rows.set(id, row);
      }
      if (row) {
        row.dataset.status = status;
        row.querySelector('.mode-c-action-label').textContent = pkg + ' ' + fromV + ' → ' + toV;
      }
      return row;
    }
    function iconFor(st) {
      if (st === 'opened' || st === 'already_exists') return '✓';
      if (st === 'in_progress') return '⟳';
      if (st === 'queued') return '○';
      return '✗';
    }

    function handleEvent(payload) {
      const t = payload.type;
      if (t === 'scan_started') setPhase('Scanning ' + (payload.repo || 'repository') + '…');
      else if (t === 'pat_validated') setPhase('PAT validated — planning PRs…');
      else if (t === 'analysis_started') setPhase('Running lenses and fix-confidence…');
      else if (t === 'analysis_complete') setPhase('Opening pull requests…');
      else if (t === 'actions_planned') {
        setPhase('Opening ' + payload.count + ' pull request(s)…');
        (payload.candidates || []).forEach(function(c) {
          const row = ensureRow(c.candidate_id, c.package, c.from, c.to, 'queued');
          if (row) {
            row.querySelector('.mode-c-action-icon').textContent = iconFor('queued');
            row.querySelector('.mode-c-action-meta').textContent = 'queued';
          }
        });
      } else if (t === 'action_started') {
        const row = ensureRow(payload.candidate_id, payload.package, payload.from, payload.to, 'in_progress');
        if (row) {
          row.querySelector('.mode-c-action-icon').textContent = iconFor('in_progress');
          row.querySelector('.mode-c-action-meta').textContent = 'creating…';
        }
      } else if (t === 'action_completed') {
        const row = ensureRow(payload.candidate_id, payload.package, payload.from, payload.to, payload.status);
        if (row) {
          row.querySelector('.mode-c-action-icon').textContent = iconFor(payload.status);
          const meta = row.querySelector('.mode-c-action-meta');
          if (payload.pr_url && payload.pr_number) {
            meta.innerHTML = '<a href="' + payload.pr_url + '" target="_blank" rel="noopener noreferrer">PR #' + payload.pr_number + '</a>';
          } else if (payload.reason) meta.textContent = payload.status + ': ' + payload.reason;
          else meta.textContent = payload.status;
        }
      } else if (t === 'scan_complete') {
        setPhase('Done — ' + payload.succeeded + ' opened, ' + payload.failed + ' failed, ' + payload.skipped + ' skipped');
        if (spinner) spinner.hidden = true;
      } else if (t === 'results_ready' && payload.scan_hash && redirectOnComplete) {
        window.location.href = '/assessment/' + payload.scan_hash;
      } else if (t === 'scan_failed') {
        setPhase('Scan failed: ' + (payload.reason || 'unknown'));
        if (payload.code === 'selection_stale' && planUrl) { window.location.href = planUrl; return; }
        if (submitBtn) submitBtn.disabled = false;
        if (spinner) spinner.hidden = true;
      }
    }

    function bindSource(source) {
      ['scan_started','pat_validated','analysis_started','analysis_complete','actions_planned','action_started','action_completed','scan_complete','results_ready','scan_failed'].forEach(function(name) {
        source.addEventListener(name, function(e) { handleEvent(JSON.parse(e.data)); });
      });
      source.addEventListener('scan_failed', function() { source.close(); });
      source.onerror = function() {
        source.close();
        if (spinner) spinner.hidden = true;
        if (submitBtn) submitBtn.disabled = false;
        if (phaseEl && !String(phaseEl.textContent).startsWith('Scan failed')) setPhase('Connection to progress stream lost');
      };
    }
    function connectScanId(scanId) {
      if (!scanId) return;
      if (progress) progress.hidden = false;
      bindSource(new EventSource(streamPrefix + scanId));
    }
    if (form && startUrl) {
      form.addEventListener('submit', async function(ev) {
        ev.preventDefault();
        if (submitBtn) submitBtn.disabled = true;
        if (spinner) spinner.hidden = false;
        if (progress) progress.hidden = false;
        if (listEl) listEl.innerHTML = '';
        rows.clear();
        setPhase('Starting scan…');
        const startResp = await fetch(startUrl, { method: 'POST', body: new FormData(form), credentials: 'same-origin' });
        if (!startResp.ok) {
          const err = await startResp.json().catch(function() { return {}; });
          setPhase('Failed to start: ' + (err.error || startResp.statusText));
          if (submitBtn) submitBtn.disabled = false;
          if (spinner) spinner.hidden = true;
          return;
        }
        const started = await startResp.json();
        connectScanId(started.scan_id);
      });
      if (urlInput) urlInput.addEventListener('input', updateGuard);
      if (patInput) patInput.addEventListener('input', function() { updateGuard(); updatePreview(); });
    } else if (autoScanId) {
      connectScanId(autoScanId);
    }
  })();
</script>
