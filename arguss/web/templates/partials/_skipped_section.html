<details class="skipped-section">
  <summary>
    Lens failures ({{ lens_failure_skips|length }})
    <span class="skipped-help">
      The scan could not fully complete one or more lenses. Results below may be incomplete.
    </span>
  </summary>
  <ul class="skipped-list">
    {% for skip in lens_failure_skips %}
      <li>
        <code>{{ skip.detail }}</code>
        <span class="skipped-reason">{{ skip.reason }} · {{ skip.lens }}</span>
      </li>
    {% endfor %}
  </ul>
</details>
