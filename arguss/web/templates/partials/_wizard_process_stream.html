{# Wizard process page | enriched SSE rows, manual completion CTA #}
<script>
  (function() {
    const streamPrefix = {{ (mode_c_stream_prefix or '/dashboard/scan-with-action/stream/') | tojson }};
    const autoScanId = {{ (mode_c_auto_scan_id or '') | tojson }};
    const planUrl = {{ (mode_c_plan_url or '') | tojson }};
    const repoDisplay = {{ (mode_c_repo_display or '') | tojson }};
    const refDisplay = {{ (mode_c_ref_display or 'HEAD') | tojson }};
    const actionId = {{ (mode_c_action_id or '') | tojson }};
    let processHydration = {{ (mode_c_process_hydration or {}) | tojson }};
    const spinner = document.getElementById('spinner');
    const progress = document.getElementById('mode-c-progress');
    const phaseEl = document.getElementById('mode-c-phase');
    const listEl = document.getElementById('mode-c-action-list');
    const completeEl = document.getElementById('stream-complete');
    const completeHeading = document.getElementById('stream-complete-heading');
    const completeActions = document.getElementById('stream-complete-actions');
    const failureCard = document.getElementById('process-failure-card');
    const pageTitle = document.getElementById('process-page-title');
    const pageSubtitle = document.getElementById('process-page-subtitle');
    const resultsLink = document.getElementById('stream-results-link');
    const loadingMessage = document.getElementById('loading-message');
    const authFailureMarkers = ['github app authorization failed', 'does not have access to this repository'];
    // Mirrors _APP_NOT_INSTALLED_MARKER in error_cards.py.
    const notInstalledMarker = "isn't installed on this repository";
    const rows = new Map();
    let plannedCount = 0;
    let pollTimer = null;
    let sseSource = null;
    // True while an auto-merge panel is mounted and has not yet reported a
    // terminal state (merged OR any escalation). Gates "View full results".
    let mergeGatePending = false;
    function setPhase(text) { if (phaseEl) phaseEl.textContent = text; }
    function setResultsLinkEnabled(enabled) {
      if (!resultsLink) return;
      if (enabled) resultsLink.removeAttribute('aria-disabled');
      else resultsLink.setAttribute('aria-disabled', 'true');
    }
    if (resultsLink) {
      resultsLink.addEventListener('click', function(ev) {
        if (resultsLink.getAttribute('aria-disabled') === 'true') ev.preventDefault();
      });
    }
    function showMergeWaitSpinner() {
      if (loadingMessage) loadingMessage.textContent = 'Waiting on CI / auto-merge…';
      if (spinner) spinner.hidden = false;
    }
    function applyMergeGate() {
      mergeGatePending = true;
      setResultsLinkEnabled(false);
      showMergeWaitSpinner();
    }
    function releaseMergeGate() {
      mergeGatePending = false;
      setResultsLinkEnabled(true);
      if (spinner) spinner.hidden = true;
    }
    function expectsAutoMerge() {
      if (!processHydration) return false;
      if (processHydration.tracks_auto_merge) return true;
      return (processHydration.auto_merge_candidate_ids || []).length > 0;
    }
    // The merge panel swaps itself via HTMX polling; each swap carries
    // data-terminal reflecting is_action_run_terminal (success or escalation).
    document.body.addEventListener('htmx:afterSwap', function() {
      const panel = document.getElementById('action-run-progress');
      if (!panel || !panel.dataset || typeof panel.dataset.terminal === 'undefined') return;
      if (panel.dataset.terminal === 'true') releaseMergeGate();
      else applyMergeGate();
    });
    function failureSuggestions(reason) {
      const lower = (reason || '').toLowerCase();
      if (lower.indexOf(notInstalledMarker) >= 0) {
        return [
          "If you don't own this repository, fork it and scan your fork",
          'Otherwise, install arguss-bot on this repository (or check its repository access) and retry',
        ];
      }
      if (authFailureMarkers.some(function(m) { return lower.indexOf(m) >= 0; })) {
        return [
          'Check that arguss-bot is still installed on this repository',
          "Ensure the App's repository access includes Contents and Pull requests",
          'Reconnect arguss-bot from the authorize step and retry',
        ];
      }
      if (lower.indexOf('rate limit') >= 0) {
        return [
          'Wait until the reset time shown above, then try again',
          'Return to authorize once the limit resets',
        ];
      }
      return [
        'Review the message above for the specific cause',
        'Return to authorize to try again',
      ];
    }
    function distinctFailureReasons(outcomes) {
      const seen = {};
      const reasons = [];
      (outcomes || []).forEach(function(o) {
        if (o.status !== 'failed' && o.status !== 'skipped') return;
        const r = (o.error || '').trim();
        if (!r || seen[r]) return;
        seen[r] = true;
        reasons.push(r);
      });
      return reasons;
    }
    function showActionFailure(reason) {
      // Accepts a single string (possibly newline-joined) or a list of
      // deduplicated per-candidate reasons.
      const reasons = (Array.isArray(reason) ? reason : String(reason || '').split('\n'))
        .map(function(r) { return (r || '').trim(); })
        .filter(function(r) { return r.length > 0; });
      const reasonText = reasons.join('\n');
      const detail = reasonText || 'The remediation action could not be completed.';
      if (pageTitle) pageTitle.textContent = 'Remediation failed';
      if (pageSubtitle) {
        pageSubtitle.innerHTML = 'The remediation action did not complete for <strong>'
          + (repoDisplay || 'this repository') + '</strong> (' + refDisplay + ').';
      }
      if (failureCard) {
        const msgEl = failureCard.querySelector('.error-card-message');
        if (msgEl) {
          msgEl.textContent = '';
          if (reasons.length > 1) {
            reasons.forEach(function(r, i) {
              if (i > 0) msgEl.appendChild(document.createElement('br'));
              msgEl.appendChild(document.createTextNode(r));
            });
          } else {
            msgEl.textContent = detail;
          }
        }
        const cardEl = failureCard.querySelector('.error-card');
        const lower = detail.toLowerCase();
        const isNetwork = authFailureMarkers.some(function(m) { return lower.indexOf(m) >= 0; })
          || lower.indexOf(notInstalledMarker) >= 0
          || lower.indexOf('rate limit') >= 0;
        if (cardEl) {
          cardEl.classList.remove('error-card-generic', 'error-card-network');
          cardEl.classList.add(isNetwork ? 'error-card-network' : 'error-card-generic');
        }
        const ul = failureCard.querySelector('.error-card-suggestions');
        if (ul) {
          ul.innerHTML = '';
          failureSuggestions(reasonText).forEach(function(s) {
            const li = document.createElement('li');
            li.textContent = s;
            ul.appendChild(li);
          });
        }
        failureCard.hidden = false;
      }
      // Keep the per-candidate rows (which carry the same reasons) visible
      // under the card; only the phase line and spinner go away.
      if (phaseEl) phaseEl.hidden = true;
      if (spinner) spinner.hidden = true;
      if (completeEl) completeEl.hidden = true;
    }
    function statusClass(st) {
      if (st === 'opened') return 'opened';
      if (st === 'already_exists') return 'already-exists';
      if (st === 'in_progress') return 'in-progress';
      if (st === 'failed' || st === 'skipped') return 'failed';
      return 'pending';
    }
    function formatBreakdown(data) {
      const opened = data.succeeded || 0;
      const already = data.already_exists || 0;
      const failed = (data.failed || 0) + (data.skipped || 0);
      if (already === 0 && failed === 0) {
        const n = opened;
        return n + ' PR' + (n === 1 ? '' : 's') + ' opened';
      }
      const parts = [];
      if (opened) parts.push(opened + ' PR' + (opened === 1 ? '' : 's') + ' opened');
      if (already) parts.push(already + ' already open');
      if (failed) parts.push(failed + ' failed');
      return parts.join(' · ');
    }
    function setAlreadyOpenBadge(row) {
      if (!row) return;
      const detail = row.querySelector('.stream-detail');
      if (detail) {
        detail.innerHTML = '<span class="stream-outcome-badge stream-outcome-badge--already-open">Already open</span>';
      }
    }
    function setRowStatus(row, status) {
      row.dataset.status = status;
      const icon = row.querySelector('.stream-status');
      if (icon) icon.className = 'stream-status stream-status--' + statusClass(status);
    }
    function ensureRow(id, c, status) {
      let row = rows.get(id);
      if (!row && listEl) {
        row = document.createElement('li');
        row.className = 'stream-row mode-c-action-row';
        row.dataset.candidateId = id;
        row.innerHTML = '<span class="stream-status stream-status--pending" aria-hidden="true"></span><span class="stream-package"></span><span class="stream-version-delta"></span><span class="stream-fix-kind"></span><span class="stream-pr"></span><span class="stream-detail"></span>';
        listEl.appendChild(row); rows.set(id, row);
      }
      if (row) {
        setRowStatus(row, status);
        row.querySelector('.stream-package').textContent = c.package || '';
        row.querySelector('.stream-version-delta').textContent = (c.from || c.from_version || '') + ' → ' + (c.to || c.to_version || '');
        const kindEl = row.querySelector('.stream-fix-kind');
        if (kindEl) kindEl.textContent = c.fix_kind || '';
      }
      return row;
    }
    function candidateFrom(payload) {
      return { package: payload.package, from: payload.from, to: payload.to, fix_kind: payload.fix_kind || '' };
    }
    function setDetail(row, text) {
      if (!row) return;
      const detail = row.querySelector('.stream-detail');
      if (detail) detail.textContent = text || '';
    }
    function setPrLink(row, url, number) {
      if (!row) return;
      const prCell = row.querySelector('.stream-pr');
      if (!prCell) return;
      if (url && number) prCell.innerHTML = '<a href="' + url + '" target="_blank" rel="noopener noreferrer">PR #' + number + ' →</a>';
      else prCell.innerHTML = '';
    }
    function mountActionRunProgress(actionRunId) {
      const mount = document.getElementById('action-run-progress-mount');
      if (!mount || !actionRunId || typeof htmx === 'undefined') return;
      // For auto-merge runs, gate results until a swap reports
      // data-terminal="true". pr_only runs (nothing to merge) skip the gate;
      // their panel is terminal on first load anyway.
      if (expectsAutoMerge()) applyMergeGate();
      mount.innerHTML = '';
      const host = document.createElement('div');
      host.setAttribute('hx-get', '/dashboard/action-run/' + actionRunId);
      host.setAttribute('hx-trigger', 'load');
      host.setAttribute('hx-swap', 'outerHTML');
      mount.appendChild(host);
      htmx.process(host);
    }
    function showCompletion(data) {
      if (!completeEl) return;
      const opened = data.succeeded || 0;
      const already = data.already_exists || 0;
      const failed = (data.failed || 0) + (data.skipped || 0);
      const positive = opened + already;
      if (completeHeading) completeHeading.textContent = formatBreakdown(data);
      if (pageTitle) {
        if (failed > 0 && positive > 0) pageTitle.textContent = 'Remediation partially complete';
        else if (failed > 0 && positive === 0) pageTitle.textContent = 'Remediation failed';
        else pageTitle.textContent = 'Remediation complete';
      }
      if (pageSubtitle) {
        pageSubtitle.innerHTML = formatBreakdown(data) + ' for <strong>'
          + (repoDisplay || 'this repository') + '</strong> (' + refDisplay + ').';
      }
      completeEl.hidden = false;
      if (completeActions) completeActions.hidden = false;
      if (phaseEl) phaseEl.hidden = true;
      // PR-opening finished, but an auto-merge run may still be waiting on
      // CI. Keep "View full results" disabled and the spinner up until the
      // merge panel reports ANY terminal state; runs without an auto-merge
      // track enable immediately (unchanged behavior). scan_complete arrives
      // before results_ready, so also consult the expected auto-merge track.
      if (mergeGatePending || expectsAutoMerge()) applyMergeGate();
      else releaseMergeGate();
    }
    function applyHydration(h) {
      if (!h || !h.has_record) return;
      if (progress) progress.hidden = false;
      (h.pr_outcomes || []).forEach(function(o) {
        const row = ensureRow(o.candidate_id, o, o.status === 'pending' ? 'pending' : o.status);
        if (o.status === 'opened') {
          setPrLink(row, o.pr_url, o.pr_number);
          setDetail(row, '');
        } else if (o.status === 'already_exists') {
          setPrLink(row, o.pr_url, o.pr_number);
          setAlreadyOpenBadge(row);
        } else if (o.status === 'failed' || o.status === 'skipped') {
          setDetail(row, o.error || o.status);
        }
      });
      if (h.terminal) {
        // Arm the gate BEFORE showCompletion so a reload mid-merge renders
        // disabled + spinner; the panel's first swap corrects it if the
        // merge already reached a terminal state.
        if (h.action_run_id) applyMergeGate();
        if (h.status === 'failed') {
          showActionFailure(h.failure_reason || distinctFailureReasons(h.pr_outcomes));
        } else if (h.scan_complete) {
          showCompletion(h.scan_complete);
        }
        if (h.action_run_id) mountActionRunProgress(h.action_run_id);
        stopHydrationPoll();
      } else if (!autoScanId) {
        setPhase('Remediation in progress…');
        startHydrationPoll();
      }
    }
    function stopHydrationPoll() {
      if (pollTimer !== null) {
        clearInterval(pollTimer);
        pollTimer = null;
      }
    }
    function startHydrationPoll() {
      if (!actionId || pollTimer !== null) return;
      pollTimer = setInterval(async function() {
        try {
          const resp = await fetch('/dashboard/wizard-process/' + actionId, { credentials: 'same-origin' });
          if (!resp.ok) return;
          const h = await resp.json();
          processHydration = h;
          applyHydration(h);
        } catch (e) {}
      }, 3000);
    }
    async function refreshHydration() {
      if (!actionId) return;
      try {
        const resp = await fetch('/dashboard/wizard-process/' + actionId, { credentials: 'same-origin' });
        if (!resp.ok) return;
        processHydration = await resp.json();
        applyHydration(processHydration);
      } catch (e) {}
    }
    function isExpiredScanFailure(reason) {
      return (reason || '').toLowerCase().indexOf('expired scan_id') >= 0
        || (reason || '').toLowerCase().indexOf('unknown or expired scan_id') >= 0;
    }
    function handleEvent(ev) {
      const d = ev.data ? JSON.parse(ev.data) : {};
      switch (ev.type) {
        case 'scan_started':
          setPhase('Scanning ' + (d.repo || 'repository') + '…');
          break;
        case 'pat_validated':
          setPhase('GitHub access verified, planning PRs…');
          break;
        case 'analysis_started':
          setPhase('Running lenses and fix-confidence…');
          break;
        case 'analysis_complete':
          setPhase('Opening pull requests…');
          break;
        case 'actions_planned':
          plannedCount = d.count || (d.candidates || []).length;
          setPhase('Opening ' + plannedCount + ' pull request' + (plannedCount === 1 ? '' : 's') + '…');
          (d.candidates || []).forEach(function(c) { ensureRow(c.candidate_id, c, 'pending'); });
          break;
        case 'action_started': {
          const row = ensureRow(d.candidate_id, candidateFrom(d), 'in_progress');
          setDetail(row, 'opening…');
          break;
        }
        case 'action_completed': {
          const row = ensureRow(d.candidate_id, candidateFrom(d), d.status);
          if (d.status === 'opened') {
            setPrLink(row, d.pr_url, d.pr_number);
            setDetail(row, '');
          } else if (d.status === 'already_exists') {
            setPrLink(row, d.pr_url, d.pr_number);
            setAlreadyOpenBadge(row);
          } else if (d.status === 'failed') setDetail(row, d.reason || 'Failed');
          else if (d.status === 'skipped') setDetail(row, d.reason || 'Skipped');
          break;
        }
        case 'scan_complete':
          showCompletion(d);
          setPhase('Complete');
          stopHydrationPoll();
          break;
        case 'results_ready':
          if (d.action_run_id) mountActionRunProgress(d.action_run_id);
          // No merge run was created (e.g. every PR failed to open): release
          // the gate so the user is never stuck behind a panel that will
          // never mount.
          else if (mergeGatePending) releaseMergeGate();
          break;
        case 'scan_failed':
          if (d.code === 'selection_stale' && planUrl) { window.location.href = planUrl; return; }
          if (isExpiredScanFailure(d.reason)) {
            if (sseSource) sseSource.close();
            if (spinner) spinner.hidden = true;
            refreshHydration().then(function() { startHydrationPoll(); });
            return;
          }
          showActionFailure(d.reason);
          stopHydrationPoll();
          break;
        case 'error':
          setPhase('Error: ' + (d.message || 'Unknown error'));
          if (spinner) spinner.hidden = true;
          break;
      }
    }
    function bindSource(source) {
      sseSource = source;
      ['scan_started','pat_validated','analysis_started','analysis_complete','actions_planned','action_started','action_completed','scan_complete','results_ready','scan_failed'].forEach(function(name) {
        source.addEventListener(name, handleEvent);
      });
      source.addEventListener('scan_failed', function() { source.close(); });
      source.onerror = function() {
        source.close();
        if (spinner) spinner.hidden = true;
        if (phaseEl && failureCard && failureCard.hidden) {
          if (actionId && processHydration && !processHydration.terminal) {
            setPhase('Reconnecting to progress…');
            refreshHydration().then(function() { startHydrationPoll(); });
          } else {
            setPhase('Connection to progress stream lost');
          }
        }
      };
    }
    function connectScanId(scanId) {
      if (!scanId) return;
      if (progress) progress.hidden = false;
      if (spinner) spinner.hidden = false;
      bindSource(new EventSource(streamPrefix + scanId));
    }
    applyHydration(processHydration);
    if (processHydration && processHydration.terminal) {
      if (spinner && !mergeGatePending) spinner.hidden = true;
    } else if (autoScanId) {
      connectScanId(autoScanId);
    } else if (processHydration && processHydration.has_record && !processHydration.terminal) {
      if (spinner) spinner.hidden = true;
      startHydrationPoll();
    }
  })();
</script>
