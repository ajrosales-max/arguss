{# Variables: citation_text, citation_href (optional) #}
{% if citation_href %}
<a class="about-ref" href="{{ citation_href }}" target="_blank" rel="noopener noreferrer">
  <span class="about-ref__num" aria-hidden="true"></span>
  <span class="about-ref__text">{{ citation_text }}</span>
  <span class="about-ref__arrow">↗</span>
</a>
{% else %}
<div class="about-ref">
  <span class="about-ref__num" aria-hidden="true"></span>
  <span class="about-ref__text">{{ citation_text }}</span>
</div>
{% endif %}
