{# Variables: citation_text, citation_href (optional) #}
<div style="padding: var(--space-4); border: 1px solid var(--color-border); border-radius: var(--radius-lg);
            background: var(--color-surface);">
  {% if citation_href %}
  <a href="{{ citation_href }}" target="_blank" rel="noopener noreferrer"
     style="font-family: var(--font-mono); font-size: var(--text-sm); color: var(--color-brand);
            text-decoration: none; line-height: var(--leading-relaxed);">
    {{ citation_text }} →
  </a>
  {% else %}
  <span style="font-family: var(--font-mono); font-size: var(--text-sm); color: var(--color-text);
               line-height: var(--leading-relaxed);">
    {{ citation_text }}
  </span>
  {% endif %}
</div>
